<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABA PayWay Test</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 480px; margin: 40px auto; text-align: center; }
  input, select, button { padding: 10px; margin: 6px 0; width: 100%; font-size: 15px; }
  button { background: #003087; color: white; border: none; cursor: pointer; }
  #qrArea img { width: 260px; margin-top: 20px; }
  #status { margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>
  <h2>ABA PayWay QR Test</h2>

  <input id="amount" type="number" placeholder="Amount" value="1.00" step="0.01">
  <select id="currency">
    <option value="USD">USD</option>
    <option value="KHR">KHR</option>
  </select>
  <select id="paymentOption">
    <option value="abapay_khqr">ABA PAY / KHQR</option>
    <option value="wechat">WeChat</option>
    <option value="alipay">Alipay</option>
  </select>
  <button onclick="createQr()">Generate QR</button>

  <div id="qrArea"></div>
  <div id="status"></div>

  <script>
    let currentTranId = null;
    let pollInterval = null;

    async function createQr() {
      const amount = document.getElementById('amount').value;
      const currency = document.getElementById('currency').value;
      const paymentOption = document.getElementById('paymentOption').value;

      document.getElementById('status').textContent = 'Generating QR...';

      const res = await fetch('/api/create-qr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount, currency, paymentOption })
      });
      const data = await res.json();

      if (data.error) {
        document.getElementById('status').textContent = 'Error: ' + JSON.stringify(data.error);
        return;
      }

      currentTranId = data.tranId;
      document.getElementById('qrArea').innerHTML = `<img src="${data.qrImage}" />`;
      document.getElementById('status').textContent = 'Waiting for payment...';

      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(checkStatus, 4000);
    }

    async function checkStatus() {
      if (!currentTranId) return;
      const res = await fetch('/api/status/' + currentTranId);
      const data = await res.json();
      if (data.status && data.status.code === '0') {
        document.getElementById('status').textContent = '✅ Payment Confirmed!';
        clearInterval(pollInterval);
      }
    }
  </script>
</body>
</html>
